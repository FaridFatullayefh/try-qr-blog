<!DOCTYPE html>
<html>
<head>
    <title>Try-QR Admin</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 12px; border-radius: 8px; border: 1px solid #ccc; }
        button { background: #2ecc71; color: white; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Yeni Məqalə</h2>
    <input type="password" id="pass" placeholder="Şifrə">
    <input type="text" id="title" placeholder="Başlıq">
    <textarea id="content" rows="10" placeholder="Məqalə mətni..."></textarea>
    <button onclick="paylas()">Paylaş</button>

    <script>
        async function paylas() {
            const data = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                pass: document.getElementById('pass').value
            };
            const resp = await fetch('https://blog-backend.faridfatullayefh.workers.dev/', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            const text = await resp.text();
            alert(text);
            if(resp.ok) location.reload();
        }
    </script>
</body>
</html>
